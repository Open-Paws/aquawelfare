name: Quality Gates
on: [push, pull_request]
jobs:
  no-animal-violence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for speciesist language
        uses: Open-Paws/no-animal-violence-action@main
        with:
          paths: 'src/ *.md'
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npx tsc --noEmit
