name: Quality Gates
on: [push, pull_request]
permissions:
  contents: read
jobs:
  no-animal-violence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for speciesist language
        uses: Open-Paws/no-animal-violence-action@main
        with:
          paths: 'app/ components/ data/ lib/ *.md'
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npx next lint
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npm test
